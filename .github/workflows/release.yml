name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release
      - run: strip target/release/claude-sessions
      - run: mv target/release/claude-sessions claude-sessions-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: claude-sessions-linux-x86_64
          path: claude-sessions-linux-x86_64

  build-macos-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin
      - run: strip target/x86_64-apple-darwin/release/claude-sessions
      - run: mv target/x86_64-apple-darwin/release/claude-sessions claude-sessions-macos-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: claude-sessions-macos-x86_64
          path: claude-sessions-macos-x86_64

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-apple-darwin
      - run: cargo build --release --target aarch64-apple-darwin
      - run: strip target/aarch64-apple-darwin/release/claude-sessions
      - run: mv target/aarch64-apple-darwin/release/claude-sessions claude-sessions-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: claude-sessions-macos-arm64
          path: claude-sessions-macos-arm64

  release:
    needs: [build-linux, build-macos-x64, build-macos-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: claude-sessions-*
          merge-multiple: true
      - run: ls -la
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-sessions-linux-x86_64
            claude-sessions-macos-x86_64
            claude-sessions-macos-arm64
